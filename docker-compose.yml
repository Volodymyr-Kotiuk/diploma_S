services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./autoinfradiag.db
      ENVIRONMENT: development
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      API_PREFIX: /api
      APP_NAME: AutoInfraDiag
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
