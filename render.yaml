services:
  - type: web
    name: autoinfradiag-backend
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: APP_NAME
        value: AutoInfraDiag
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: REPORTS_DIR
        value: reports
